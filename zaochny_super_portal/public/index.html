
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZaOQY Super Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="loginPage" class="login-page">
    <div class="login-hero">
      <div class="logo-xl">Z</div>
      <h1>ZaOQY Super Portal</h1>
      <p>Полноценный портал для заочных студентов: задания, тесты, группы, предметы, чат, уведомления, сертификаты и админ-панель.</p>
      <div class="demo">
        <b>Демо:</b><br>
        admin / 1234<br>
        teacher / 1234<br>
        student / 1234<br>
        student2 / 1234
      </div>
    </div>
    <div class="login-card">
      <div class="tabs">
        <button class="tab active" data-login-tab="login">Вход</button>
        <button class="tab" data-login-tab="register">Регистрация</button>
      </div>
      <form id="loginForm">
        <label>Логин</label><input id="loginInput" placeholder="admin / teacher / student">
        <label>Пароль</label><input id="passwordInput" type="password" placeholder="1234">
        <button class="primary" type="submit">Войти</button>
        <p id="loginError" class="error"></p>
      </form>
      <form id="registerForm" class="hidden">
        <label>ФИО</label><input id="regName">
        <label>Логин</label><input id="regLogin">
        <label>Пароль</label><input id="regPassword" type="password">
        <label>Email</label><input id="regEmail">
        <label>Группа</label><select id="regGroup"></select>
        <button class="primary" type="submit">Отправить регистрацию</button>
        <p class="muted">Админ должен подтвердить аккаунт.</p>
      </form>
    </div>
  </section>

  <main id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand"><div class="logo">Z</div><div><h2>ZaOQY</h2><span>Super Portal</span></div></div>
      <div class="user-card"><div class="avatar" id="avatar">U</div><div><b id="userName"></b><span id="userRole"></span></div></div>
      <nav id="nav"></nav>
      <button class="logout" id="logoutBtn">Выйти</button>
    </aside>
    <section class="main">
      <header class="topbar">
        <button id="burger">☰</button>
        <div><h1 id="pageTitle">Главная</h1><p id="pageSubtitle">Добро пожаловать</p></div>
        <div class="top-actions">
          <button id="notifyBtn" class="mini">🔔 <span id="notifCount"></span></button>
          <button id="refreshBtn" class="mini">🔄</button>
        </div>
      </header>
      <section id="content" class="content"></section>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button id="closeModal" class="close">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
