<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Zaochny Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="loginPage" class="loginPage">
    <div class="loginHero">
      <div class="logoBig">Z</div>
      <h1>ZaOQY Portal</h1>
      <p>Реальный сайт для заочных студентов: задания создаются на сервере и видны с других устройств.</p>
      <div class="demoBox">
        <b>Демо-аккаунты:</b><br>
        Преподаватель: <b>teacher</b> / 1234<br>
        Студент: <b>student</b> / 1234<br>
        Студент 2: <b>student2</b> / 1234
      </div>
    </div>

    <form id="loginForm" class="loginCard">
      <h2>Вход</h2>
      <label>Логин</label>
      <input id="loginInput" placeholder="teacher / student / student2" required>
      <label>Пароль</label>
      <input id="passwordInput" type="password" placeholder="1234" required>
      <button class="primary" type="submit">Войти</button>
      <p id="loginError" class="error"></p>
    </form>
  </section>

  <main id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="brandIcon">Z</div>
        <div>
          <h2>ZaOQY</h2>
          <span>Real Portal</span>
        </div>
      </div>

      <div class="userMini">
        <div class="avatar" id="avatar">S</div>
        <div>
          <b id="userName">Student</b>
          <span id="userRole">student</span>
        </div>
      </div>

      <nav>
        <button class="navBtn active" data-page="dashboard">🏠 Главная</button>
        <button class="navBtn" data-page="tasks">✅ Задания</button>
        <button class="navBtn teacherOnly" data-page="submissions">📥 Ответы студентов</button>
        <button class="navBtn" data-page="grades">📊 Оценки</button>
        <button class="navBtn" data-page="session">📝 Сессия</button>
        <button class="navBtn" data-page="profile">👤 Профиль</button>
      </nav>

      <button id="logoutBtn" class="logout">Выйти</button>
    </aside>

    <section class="contentWrap">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Главная</h1>
          <p id="pageSubtitle">Добро пожаловать</p>
        </div>
        <div class="topActions">
          <button id="refreshBtn">🔄 Обновить</button>
          <button id="openIpHelp">🌐 Как открыть с другого устройства</button>
        </div>
      </header>

      <section id="content" class="content"></section>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modalBox">
      <button id="closeModal" class="close">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
